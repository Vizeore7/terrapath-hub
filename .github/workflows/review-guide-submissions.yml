name: Review guide submissions

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

permissions:
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect guide submission
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || '';
            const body = context.payload.issue.body || '';
            const labels = context.payload.issue.labels.map((label) => label.name);
            const isSubmission =
              labels.includes('guide-submission') ||
              title.startsWith('[Guide]:') ||
              body.includes('```json') ||
              body.includes('guide.json');

            core.setOutput('is_submission', isSubmission ? 'true' : 'false');

      - name: Set up Python
        if: steps.detect.outputs.is_submission == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure moderation labels exist
        if: steps.detect.outputs.is_submission == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              ["guide-submission", "1f6feb", "Guide JSON submitted by a community author"],
              ["needs-review", "fbca04", "Needs human review"],
              ["validated", "238636", "JSON passed automatic validation"],
              ["validation-failed", "cf222e", "JSON failed automatic validation"],
              ["approved", "5319e7", "Approved by a maintainer and ready for publication"],
              ["automated-pr", "0e8a16", "Pull request created by moderation workflow"]
            ];
            for (const [name, color, description] of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description
                });
              }
            }

      - name: Mark issue as guide submission
        if: steps.detect.outputs.is_submission == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const existingLabels = context.payload.issue.labels.map((label) => label.name);
            const missing = ['guide-submission', 'needs-review'].filter((label) => !existingLabels.includes(label));

            if (missing.length) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: missing
              });
            }

      - name: Validate issue payload
        if: steps.detect.outputs.is_submission == 'true'
        id: validate
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python tools/issue_submission.py validate-issue

      - name: Sync moderation labels and comment
        if: steps.detect.outputs.is_submission == 'true'
        uses: actions/github-script@v7
        env:
          VALIDATION_RESULT: ${{ steps.validate.outcome }}
          GUIDE_ID: ${{ steps.validate.outputs.guide_id }}
          GUIDE_PATH: ${{ steps.validate.outputs.guide_path }}
          GUIDE_TITLE: ${{ steps.validate.outputs.guide_title }}
          VALIDATION_ERROR: ${{ steps.validate.outputs.error }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- terrapath-moderation-status -->';
            const valid = process.env.VALIDATION_RESULT === 'success';
            const issueLabels = context.payload.issue.labels.map((label) => label.name);

            async function addLabel(name) {
              if (issueLabels.includes(name)) return;
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [name] });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            async function removeLabel(name) {
              if (!issueLabels.includes(name)) return;
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            if (valid) {
              await addLabel('validated');
              await removeLabel('validation-failed');
            } else {
              await addLabel('validation-failed');
              await removeLabel('validated');
              await removeLabel('approved');
            }

            const body = valid
              ? [
                  marker,
                  '',
                  '## TerraPath moderation status',
                  '',
                  'Automatic validation passed.',
                  '',
                  `- Guide: \`${process.env.GUIDE_ID}\``,
                  `- Title: ${process.env.GUIDE_TITLE}`,
                  `- Target path: \`${process.env.GUIDE_PATH}\``,
                  '',
                  'Next step for a moderator:',
                  '1. Read the guide in the issue.',
                  '2. Check progression quality and naming.',
                  '3. In the right sidebar, open Labels and add the `approved` label when the guide is ready for publication.'
                ].join('\n')
              : [
                  marker,
                  '',
                  '## TerraPath moderation status',
                  '',
                  'Automatic validation failed.',
                  '',
                  '```text',
                  process.env.VALIDATION_ERROR || 'Unknown validation error',
                  '```',
                  '',
                  'Next step for the author:',
                  '1. Fix the JSON in the issue.',
                  '2. Edit the issue body.',
                  '3. Wait for this validation check to run again.'
                ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            }
